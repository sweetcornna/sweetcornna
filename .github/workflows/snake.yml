name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sweetcornna
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FBBF24&color_dots=#F8FAFC,#DBEAFE,#60A5FA,#2563EB,#1E40AF
            dist/github-contribution-grid-snake-dark.svg?color_snake=#FBBF24&color_dots=#F8FAFC,#DBEAFE,#60A5FA,#2563EB,#1E40AF

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
